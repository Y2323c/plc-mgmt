name: コーチングリマインド

on:
  schedule:
    - cron: '0 23 * * *'  # JST 8:00（前日確認通知）
    - cron: '0 0 * * *'   # JST 9:00（本番送信）
  workflow_dispatch:       # 手動実行ボタン
    inputs:
      preview:
        description: '前日確認モード（--preview）で実行する'
        type: boolean
        default: false

env:
  TZ: Asia/Tokyo           # date.today() を JST に合わせる

jobs:
  remind:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CHATWORK_COACHING_API_TOKEN: ${{ secrets.CHATWORK_COACHING_API_TOKEN }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 23 * * *" ] || [ "${{ github.event.inputs.preview }}" = "true" ]; then
            python3 scripts/coaching_reminder.py --preview
          else
            python3 scripts/coaching_reminder.py
          fi
